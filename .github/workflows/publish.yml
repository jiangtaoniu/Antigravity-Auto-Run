name: Publish Extension

on:
  release:
    types: [published]

# Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Package VSIX
        run: npx -y @vscode/vsce package -o ./extension.vsix

      - name: Publish to VS Code Marketplace
        run: npx -y @vscode/vsce publish -p ${{ secrets.VSCE_PAT }}

      - name: Upload VSIX to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ./extension.vsix

# ═══════════════════════════════════════════════════════════════════
# SETUP INSTRUCTIONS (delete this comment block after setup):
#
# 1. Create a Publisher on https://marketplace.visualstudio.com/manage
#    - Sign in with your Microsoft account
#    - Click "Create publisher" and choose a unique Publisher ID
#    - Update `publisher` in package.json with your Publisher ID
#
# 2. Create a Personal Access Token (PAT):
#    - Go to https://dev.azure.com → User Settings → Personal Access Tokens
#    - Click "New Token"
#    - Organization: "All accessible organizations"
#    - Scopes: select "Marketplace" → check "Manage"
#    - Copy the generated token
#
# 3. Add the PAT as a GitHub Secret:
#    - Go to your GitHub repo → Settings → Secrets → Actions
#    - Click "New repository secret"
#    - Name: VSCE_PAT
#    - Value: paste the token from step 2
#
# 4. To publish a new version:
#    a. Update `version` in package.json (e.g., 2.0.1)
#    b. Commit and push to main
#    c. Create a new Release on GitHub with tag `v2.0.1`
#    d. The workflow will auto-publish to Marketplace
#
# Alternative: manual publish via CLI:
#    npx -y @vscode/vsce publish -p <YOUR_PAT>
# ═══════════════════════════════════════════════════════════════════
